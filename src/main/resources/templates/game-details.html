<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0" th:text="${game.title}"></h2>
                    <a th:href="@{/games}" class="btn btn-outline-secondary btn-sm">Back to Games</a>
                </div>

                <p th:if="${game.description}" th:text="${game.description}"></p>

                <table class="table table-borderless">
                    <tbody>
                        <tr>
                            <th>Pitch</th>
                            <td th:text="${game.pitchName + ' - ' + game.locationCity + ' - ' + game.locationArea}"></td>
                        </tr>
                        <tr>
                            <th>Date</th>
                            <td th:text="${game.gameDate}"></td>
                        </tr>
                        <tr>
                            <th>Time</th>
                            <td th:text="${game.gameTime}"></td>
                        </tr>
                        <tr>
                            <th>Duration</th>
                            <td th:text="${game.durationMinutes + ' minutes'}"></td>
                        </tr>
                        <tr>
                            <th>Game Type</th>
                            <td th:text="${game.gameType.label}"></td>
                        </tr>
                        <tr>
                            <th>Gender Option</th>
                            <td th:text="${game.genderOption}"></td>
                        </tr>
                        <tr>
                            <th>Organiser</th>
                            <td th:text="${game.organiserName}"></td>
                        </tr>
                        <tr>
                            <th>Price</th>
                            <td th:text="${game.price}"></td>
                        </tr>
                        <tr>
                            <th>Payment Type</th>
                            <td th:text="${game.paymentType}"></td>
                        </tr>
                        <tr>
                            <th>Status</th>
                            <td th:text="${game.status}"></td>
                        </tr>
                        <tr>
                            <th>Availability</th>
                            <td th:text="${game.attendingCount + ' attending, ' + game.remainingSlots + (game.remainingSlots == 1 ? ' spot remaining' : ' spots remaining')}"></td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>
    </div>
</body>
</html>
