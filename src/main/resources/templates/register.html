<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-4">Create Account</h2>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form method="post" th:action="@{/register}" th:object="${registerRequestDto}">

                    <div class="mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required />
                        <span th:if="${#fields.hasErrors('firstName')}"
                              th:errors="*{firstName}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required />
                        <span th:if="${#fields.hasErrors('lastName')}"
                              th:errors="*{lastName}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" th:field="*{username}" class="form-control" required />
                        <span th:if="${#fields.hasErrors('username')}"
                              th:errors="*{username}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required />
                        <span th:if="${#fields.hasErrors('email')}"
                              th:errors="*{email}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required />
                        <span th:if="${#fields.hasErrors('password')}"
                              th:errors="*{password}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select id="gender" th:field="*{gender}" class="form-select">
                            <option value="">-- Select Gender --</option>
                            <option th:each="g : ${genders}"
                                    th:value="${g}"
                                    th:text="${g}"></option>
                        </select>
                        <span th:if="${#fields.hasErrors('gender')}"
                              th:errors="*{gender}"
                              class="text-danger small"></span>
                        <div id="genderHint" class="form-text"></div>
                    </div>

                    <div class="mb-3">
                        <label for="city" class="form-label">City</label>
                        <select id="city" class="form-select">
                            <option value="">-- Select City --</option>
                            <option th:each="c : ${cities}" th:value="${c}" th:text="${c}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="locationId" class="form-label">Area</label>
                        <select id="locationId" th:field="*{locationId}" class="form-select">
                            <option value="">-- Select Area --</option>
                            <option th:each="loc : ${locations}"
                                    th:value="${loc.id}"
                                    th:text="${loc.area}"
                                    th:attr="data-city=${loc.city}"></option>
                        </select>
                        <span th:if="${#fields.hasErrors('locationId')}"
                              th:errors="*{locationId}"
                              class="text-danger small"></span>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>

                </form>

                <p class="mt-3 text-center">
                    Already have an account? <a th:href="@{/login}">Sign in here</a>
                </p>

            </div>
        </div>
    </div>

    <script>
        const genderSelect = document.getElementById('gender');
        const genderHint = document.getElementById('genderHint');

        function syncGenderHint() {
            genderHint.textContent = genderSelect.value === 'PREFER_NOT_TO_SAY'
                ? 'You\'ll only be able to join Mixed games.'
                : '';
        }

        genderSelect.addEventListener('change', syncGenderHint);
        syncGenderHint();

        const citySelect = document.getElementById('city');
        const areaSelect = document.getElementById('locationId');
        const allAreaOptions = Array.from(areaSelect.options).filter(o => o.value !== '');

        function syncAreaOptions() {
            const selectedCity = citySelect.value;
            const previouslySelectedValue = areaSelect.value;
            areaSelect.innerHTML = '';
            areaSelect.appendChild(new Option('-- Select Area --', ''));
            allAreaOptions
                .filter(o => !selectedCity || o.dataset.city === selectedCity)
                .forEach(o => areaSelect.appendChild(o.cloneNode(true)));
            if (Array.from(areaSelect.options).some(o => o.value === previouslySelectedValue)) {
                areaSelect.value = previouslySelectedValue;
            }
        }

        const initiallySelectedArea = allAreaOptions.find(o => o.selected);
        if (initiallySelectedArea) {
            citySelect.value = initiallySelectedArea.dataset.city;
        }

        citySelect.addEventListener('change', syncAreaOptions);
        syncAreaOptions();
    </script>
</body>
</html>
