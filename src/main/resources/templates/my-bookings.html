<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <h2 class="mb-4">My Bookings</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <h4>Upcoming</h4>
        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Game</th>
                    <th>Pitch</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}" th:if="${!booking.pastGame}" th:id="'booking-' + ${booking.id}">
                    <td th:text="${booking.gameTitle}"></td>
                    <td th:text="${booking.pitchName + ' - ' + booking.locationCity + ' - ' + booking.locationArea}"></td>
                    <td th:text="${booking.gameDate}"></td>
                    <td th:text="${booking.gameTime}"></td>
                    <td th:text="${booking.status}"></td>
                    <td>
                        <a th:href="@{/games/{id}(id=${booking.gameId})}" class="btn btn-outline-primary btn-sm">View</a>
                        <form th:if="${booking.status.name() == 'CONFIRMED'}" method="post"
                              th:action="@{/my-bookings/{id}/withdraw(id=${booking.gameId})}"
                              class="d-inline withdraw-form" th:attr="data-confirm-message=${booking.withdrawConfirmMessage}">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Withdraw</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4>Past</h4>
        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Game</th>
                    <th>Pitch</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}" th:if="${booking.pastGame}" th:id="'booking-' + ${booking.id}">
                    <td th:text="${booking.gameTitle}"></td>
                    <td th:text="${booking.pitchName + ' - ' + booking.locationCity + ' - ' + booking.locationArea}"></td>
                    <td th:text="${booking.gameDate}"></td>
                    <td th:text="${booking.gameTime}"></td>
                    <td th:text="${booking.status}"></td>
                    <td>
                        <a th:href="@{/games/{id}(id=${booking.gameId})}" class="btn btn-outline-primary btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <script>
        document.querySelectorAll('.withdraw-form').forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!confirm(form.getAttribute('data-confirm-message'))) {
                    event.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
