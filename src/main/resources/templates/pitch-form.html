<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pitch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-4">Pitch Details</h2>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form method="post"
                      th:action="${pitchId} != null ? @{/admin/pitches/{id}(id=${pitchId})} : @{/admin/pitches}"
                      th:object="${pitchRequestDto}">

                    <div class="mb-3 form-check" th:if="${pitchId} != null">
                        <input type="checkbox" th:field="*{active}" class="form-check-input" />
                        <label for="active" class="form-check-label">Active</label>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" th:field="*{name}" class="form-control" required />
                        <span th:if="${#fields.hasErrors('name')}"
                              th:errors="*{name}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="locationId" class="form-label">Location</label>
                        <select th:field="*{locationId}" class="form-select">
                            <option value="">-- Select Location --</option>
                            <option th:each="loc : ${locations}"
                                    th:value="${loc.id}"
                                    th:text="${loc.city + ' - ' + loc.area}"></option>
                        </select>
                        <span th:if="${#fields.hasErrors('locationId')}"
                              th:errors="*{locationId}"
                              class="text-danger small"></span>
                    </div>

                    <div class="mb-3">
                        <label for="capacity" class="form-label">Capacity</label>
                        <input type="number" th:field="*{capacity}" class="form-control" min="10" max="22" required />
                        <span th:if="${#fields.hasErrors('capacity')}"
                              th:errors="*{capacity}"
                              class="text-danger small"></span>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save Pitch</button>

                </form>

            </div>
        </div>
    </div>
</body>
</html>
