<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0">Confirm Your Booking</h2>
                    <form method="post" th:action="@{/games/{id}/checkout/cancel(id=${game.id})}" id="cancel-form">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Cancel Checkout</button>
                    </form>
                </div>

                <div class="alert alert-info" id="hold-timer-alert">
                    Your slot is held for the next <strong id="hold-timer" th:attr="data-expires-at=${#temporals.format(holdExpiresAt, 'yyyy-MM-dd''T''HH:mm:ss')}"></strong>. Confirm your booking before the hold expires, or it will be released back to other players.
                </div>

                <div class="alert alert-danger d-none" id="hold-expired-alert">
                    Your hold has expired and the slot has been released. <a th:href="@{/games/{id}(id=${game.id})}">Return to the game</a> to try joining again.
                </div>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <table class="table table-borderless">
                    <tbody>
                        <tr>
                            <th>Game</th>
                            <td th:text="${game.title}"></td>
                        </tr>
                        <tr>
                            <th>Pitch</th>
                            <td th:text="${game.pitchName + ' - ' + game.locationCity + ' - ' + game.locationArea}"></td>
                        </tr>
                        <tr>
                            <th>Date</th>
                            <td th:text="${game.gameDate}"></td>
                        </tr>
                        <tr>
                            <th>Time</th>
                            <td th:text="${game.gameTime}"></td>
                        </tr>
                        <tr th:if="${game.paymentType.name() == 'PAID_ONLINE'}">
                            <th>Price</th>
                            <td th:text="${game.price + ' credits'}"></td>
                        </tr>
                    </tbody>
                </table>

                <form method="post" th:if="${game.paymentType.name() == 'PAID_ONLINE'}"
                      th:action="@{/games/{id}/checkout/topup(id=${game.id})}" th:object="${creditRequestDto}"
                      class="d-flex gap-2 align-items-center mb-4">
                    <input type="number" step="0.01" min="1" class="form-control" style="max-width: 150px;"
                           th:field="*{creditAmount}" placeholder="Amount">
                    <button type="submit" class="btn btn-outline-primary">Add Credits</button>
                </form>

                <form method="post" th:action="@{/games/{id}/checkout/confirm(id=${game.id})}" id="confirm-form">
                    <button type="submit" class="btn btn-primary" id="confirm-button">Confirm Booking</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const holdTimer = document.getElementById('hold-timer');
        const expiresAt = new Date(holdTimer.getAttribute('data-expires-at')).getTime();

        function showExpired() {
            clearInterval(intervalId);
            document.getElementById('hold-timer-alert').classList.add('d-none');
            document.getElementById('hold-expired-alert').classList.remove('d-none');
            document.getElementById('confirm-button').disabled = true;
            document.getElementById('cancel-form').classList.add('d-none');
        }

        function tick() {
            const remainingMs = expiresAt - Date.now();
            if (remainingMs <= 0) {
                showExpired();
                return;
            }
            const totalSeconds = Math.floor(remainingMs / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            holdTimer.textContent = minutes + ':' + String(seconds).padStart(2, '0');
        }

        const intervalId = setInterval(tick, 1000);
        tick();
    </script>
</body>
</html>
