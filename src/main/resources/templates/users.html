<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <h2 class="mb-4">Users</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form method="get" th:action="@{/admin/users}" th:object="${userFilterDto}" class="row g-2 mb-4">
            <div class="col-md-3">
                <input type="text" th:field="*{searchQuery}" class="form-control" placeholder="Search name, username or email" />
            </div>
            <div class="col-md-3 d-flex align-items-center gap-3">
                <div th:each="r : ${allRoles}" class="form-check form-check-inline">
                    <input type="checkbox" th:field="*{roles}" th:value="${r}" class="form-check-input" />
                    <label th:text="${r}" class="form-check-label"></label>
                </div>
            </div>
            <div class="col-md-2 form-check d-flex align-items-center">
                <input type="checkbox" th:field="*{activeOnly}" class="form-check-input" id="activeOnly" />
                <label for="activeOnly" class="form-check-label ms-2">Active only</label>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-secondary w-100">Search</button>
            </div>
            <div class="col-md-1">
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary w-100">Reset</a>
            </div>
        </form>

        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}" th:id="'user-' + ${user.id}">
                    <td th:text="${user.firstName + ' ' + user.lastName}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.role}"></td>
                    <td>
                        <span th:if="${user.active}" class="badge bg-success">Active</span>
                        <span th:unless="${user.active}" class="badge bg-secondary">Inactive</span>
                    </td>
                    <td>
                        <span th:if="${user.email == currentUserEmail}" class="text-muted fst-italic">You cannot change your own role or active status</span>
                        <form th:unless="${user.email == currentUserEmail}" method="post"
                              th:action="@{/admin/users/{id}(id=${user.id})}" class="d-flex gap-2 align-items-center">
                            <select name="role" class="form-select form-select-sm">
                                <option th:each="r : ${allRoles}" th:value="${r}" th:text="${r}"
                                        th:selected="${r == user.role}"></option>
                            </select>
                            <select name="active" class="form-select form-select-sm">
                                <option value="true" th:selected="${user.active}">Active</option>
                                <option value="false" th:selected="${!user.active}">Inactive</option>
                            </select>
                            <button type="submit" class="btn btn-outline-primary btn-sm">Save</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</body>
</html>
