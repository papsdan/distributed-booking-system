<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" style="letter-spacing: 0.5px;" th:href="@{/games}">&#9917; KickAbout</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" th:href="@{/games}">Games</a>
                <a class="nav-link" th:href="@{/my-bookings}">My Bookings</a>
                <a class="nav-link" th:href="@{/profile}">Profile</a>
                <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/pitches}">Admin: Pitches</a>
            </div>
            <form method="post" th:action="@{/logout}" class="d-flex">
                <button type="submit" class="btn btn-outline-light btn-sm">Log Out</button>
            </form>
        </div>

        <script>
            document.querySelectorAll('.nav-link').forEach(function (link) {
                if (window.location.pathname.startsWith(link.getAttribute('href'))) {
                    link.classList.add('active');
                }
            });
        </script>
    </nav>
</body>
</html>
