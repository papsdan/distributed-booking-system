<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Games</h2>
            <a th:href="@{/games/new}" class="btn btn-primary">Create Game</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Pitch</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Gender</th>
                    <th>Max Players</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${games}" th:id="'game-' + ${game.id}">
                    <td th:text="${game.title}"></td>
                    <td th:text="${game.pitchName + ' - ' + game.locationCity + ' - ' + game.locationArea}"></td>
                    <td th:text="${game.gameDate}"></td>
                    <td th:text="${game.gameTime}"></td>
                    <td th:text="${game.gameType.label}"></td>
                    <td th:text="${game.genderOption}"></td>
                    <td th:text="${game.maxPlayers}"></td>
                    <td th:text="${game.price}"></td>
                    <td th:text="${game.status}"></td>
                    <td>
                        <a th:href="@{/games/{id}/edit(id=${game.id})}" class="btn btn-outline-secondary btn-sm">Edit</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</body>
</html>
