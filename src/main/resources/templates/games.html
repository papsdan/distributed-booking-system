<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Games</h2>
            <a th:href="@{/games/new}" class="btn btn-primary">Create Game</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form method="get" th:action="@{/games}" th:object="${gameFilterDto}" class="row g-2 mb-4">
            <div class="col-md-2">
                <select th:field="*{city}" class="form-select">
                    <option value="">-- Any City --</option>
                    <option th:each="c : ${cities}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select th:field="*{area}" class="form-select">
                    <option value="">-- Any Area --</option>
                    <option th:each="a : ${areas}" th:value="${a}" th:text="${a}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select th:field="*{gameType}" class="form-select">
                    <option value="">-- Any Game Type --</option>
                    <option th:each="type : ${gameTypes}" th:value="${type}" th:text="${type.label}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select th:field="*{genderOption}" class="form-select">
                    <option value="">-- Any Gender --</option>
                    <option th:each="option : ${genderOptions}" th:value="${option}" th:text="${option}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="date" th:field="*{gameDate}" class="form-control" placeholder="Date" />
            </div>
            <div class="col-md-2">
                <input type="number" step="0.01" min="0" th:field="*{maxPrice}" class="form-control" placeholder="Max Price" />
            </div>
            <div class="col-md-2 form-check d-flex align-items-center">
                <input type="checkbox" th:field="*{openSlotsOnly}" class="form-check-input" id="openSlotsOnly" />
                <label for="openSlotsOnly" class="form-check-label ms-2">Open slots only</label>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-secondary w-100">Filter</button>
            </div>
            <div class="col-md-1">
                <a th:href="@{/games}" class="btn btn-outline-secondary w-100">Reset</a>
            </div>
        </form>

        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Pitch</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Gender</th>
                    <th>Attending</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${games}" th:id="'game-' + ${game.id}">
                    <td th:text="${game.title}"></td>
                    <td>
                        <span th:text="${game.pitchName + ' - ' + game.locationCity + ' - ' + game.locationArea}"></span>
                        <span th:if="${game.locationCity == preferredLocationCity and game.locationArea == preferredLocationArea}"
                              class="badge bg-info text-dark">Matches your preferred area</span>
                    </td>
                    <td th:text="${game.gameDate}"></td>
                    <td th:text="${game.gameTime}"></td>
                    <td th:text="${game.gameType.label}"></td>
                    <td th:text="${game.genderOption}"></td>
                    <td th:text="${game.attendingCount + ' / ' + game.maxPlayers}"></td>
                    <td th:text="${game.price}"></td>
                    <td th:text="${game.status}"></td>
                    <td>
                        <a th:href="@{/games/{id}(id=${game.id})}" class="btn btn-outline-primary btn-sm">View</a>
                        <a th:if="${game.organiserEmail == currentUserEmail or #authorization.expression('hasRole(''ROLE_ADMIN'')')}"
                           th:href="@{/games/{id}/edit(id=${game.id})}" class="btn btn-outline-secondary btn-sm">Edit</a>
                        <form th:if="${(game.organiserEmail == currentUserEmail or #authorization.expression('hasRole(''ROLE_ADMIN'')')) and game.status.name() != 'CANCELLED' and !game.pastGame}"
                              method="post" th:action="@{/games/{id}/cancel(id=${game.id})}" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Cancel</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</body>
</html>
