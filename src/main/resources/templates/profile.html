<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-4">My Profile</h2>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form method="post" th:action="@{/profile}" th:object="${updateProfileRequestDto}">

                    <div class="mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select id="gender" th:field="*{gender}" class="form-select">
                            <option value="">-- Select Gender --</option>
                            <option th:each="g : ${genders}"
                                    th:value="${g}"
                                    th:text="${g}"></option>
                        </select>
                        <span th:if="${#fields.hasErrors('gender')}"
                              th:errors="*{gender}"
                              class="text-danger small"></span>
                        <div id="genderHint" class="form-text"></div>
                    </div>

                    <div class="mb-3">
                        <label for="locationId" class="form-label">Preferred Location</label>
                        <select th:field="*{locationId}" class="form-select">
                            <option value="">-- Select Location --</option>
                            <option th:each="loc : ${locations}"
                                    th:value="${loc.id}"
                                    th:text="${loc.city + ' - ' + loc.area}"></option>
                        </select>
                        <span th:if="${#fields.hasErrors('locationId')}"
                              th:errors="*{locationId}"
                              class="text-danger small"></span>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Update Profile</button>

                </form>

            </div>
        </div>
    </div>

    <script>
        const genderSelect = document.getElementById('gender');
        const genderHint = document.getElementById('genderHint');

        function syncGenderHint() {
            genderHint.textContent = genderSelect.value === 'PREFER_NOT_TO_SAY'
                ? 'You\'ll only be able to join Mixed games.'
                : '';
        }

        genderSelect.addEventListener('change', syncGenderHint);
        syncGenderHint();
    </script>
</body>
</html>
